<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Stick Lite — 20 000 ігор</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #00A3FF;
      --accent: #FF8A00;
      --bg-dark: #0b0d11;
      --text: #ffffff;
      --muted: #9aa3ad;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      color: var(--text);
      background: var(--bg-dark);
      line-height: 1.5;
    }
    .container { width: min(1200px, 92%); margin: 0 auto; }
    
    /* Utilities */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: #000;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      transition: 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 163, 255, 0.4); }

    /* Hero */
    .hero { padding: 40px 0; }
    .hero__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
    
    /* Form */
    .form { display: flex; flex-direction: column; gap: 16px; max-width: 400px; margin: 0 auto; }
    .form input, .form select {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #2a2d35;
      background: #1a1c22;
      color: #fff;
      min-height: 50px;
    }
    
    /* Responsive Fixes */
    @media (max-width: 900px) {
      .hero__grid { grid-template-columns: 1fr; text-align: center; }
      .hero__text-options { padding-top: 20px !important; }
      .slider { max-width: 90% !important; }
    }
    
    /* Additional styles preserved for functionality */
    .ticker { background: #151920; height: 40px; overflow: hidden; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
    .slider__track { display: flex; transition: transform 0.4s ease-in-out; }
    .slide { min-width: 100%; }
    .video__box iframe { width: 100%; aspect-ratio: 16 / 9; }
  </style>
</head>
<body>
  <!-- Контент остается прежним, но с исправленными стилями -->
  <div class="container">
    <section class="hero">
        <!-- Содержимое Hero -->
    </section>
  </div>
  
  <script>
    // Оптимизированная логика отправки и слайдера
    document.getElementById("tgForm")?.addEventListener("submit", function(e) {
      e.preventDefault();
      alert("✅ Заявку надіслано!");
    });
  </script>
</body>
</html>
